# Dashy — single-host deployment (app + MongoDB).
# Values come from the .env file (copy .env.example → .env first).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Not published to the host — only reachable on the internal compose network.

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # Defaults to production; set NODE_ENV=development in .env for local HTTP
      # testing so session cookies are not flagged Secure (sent over http://).
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      APP_ORIGIN: ${APP_ORIGIN}
      MONGO_URI: mongodb://mongo:27017/dashy
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
    volumes:
      - apps_data:/data
    ports:
      - "${HOST_PORT:-3000}:3000"

volumes:
  mongo_data:
  apps_data:
