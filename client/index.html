<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f7efe7" />
    <title>Dashy</title>
    <script>
      // Apply the saved theme before paint to avoid a flash. Defaults to light.
      (function () {
        try {
          var t = localStorage.getItem('dashy-theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
          else if (t === 'violet') document.documentElement.classList.add('violet');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
